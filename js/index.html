<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRONOS SYSTEM - Gestão Financeira</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid">
        <!-- Header -->
        <header class="executive-header">
            <div class="logo-section">
                <i class="fas fa-chart-line"></i>
                <h1>KRONOS SYSTEM</h1>
                <span class="subtitle">Gestão Financeira</span>
            </div>
            <div class="date-display" id="currentDate"></div>
        </header>

        <!-- Dashboard de Status -->
        <div class="status-cards">
            <div class="card status-card pago">
                <i class="fas fa-check-circle"></i>
                <h5>PAGO</h5>
                <div class="count" id="countPago">0</div>
            </div>
            <div class="card status-card quitado">
                <i class="fas fa-star"></i>
                <h5>QUITADO</h5>
                <div class="count" id="countQuitado">0</div>
            </div>
            <div class="card status-card finalizando">
                <i class="fas fa-spinner"></i>
                <h5>FINALIZANDO</h5>
                <div class="count" id="countFinalizando">0</div>
            </div>
            <div class="card status-card inadimplente">
                <i class="fas fa-exclamation-triangle"></i>
                <h5>INADIMPLENTE</h5>
                <div class="count" id="countInadimplente">0</div>
            </div>
        </div>

        <!-- Filtros de Data -->
        <div class="filter-section">
            <div class="row">
                <div class="col-md-4">
                    <select id="mesFiltro" class="form-select executive-select">
                        <option value="">Selecionar Mês</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <select id="diaFiltro" class="form-select executive-select">
                        <option value="">Todos os Dias</option>
                        <option value="5">Dia 5</option>
                        <option value="20">Dia 20</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <button class="btn btn-executive w-100" onclick="filtrarClientes()">
                        <i class="fas fa-filter"></i> Filtrar
                    </button>
                </div>
            </div>
        </div>

        <!-- Tabela de Clientes -->
        <div class="table-container">
            <table class="table executive-table">
                <thead>
                    <tr>
                        <th>Cliente</th>
                        <th>Marca</th>
                        <th>Valor Total</th>
                        <th>Valor em Aberto</th>
                        <th>Parcelas Pagas</th>
                        <th>Vencimento</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="clientesTableBody"></tbody>
            </table>
        </div>

        <!-- Botão Novo Cliente -->
        <button class="btn-add-client" onclick="abrirModalCliente()">
            <i class="fas fa-plus"></i> Novo Cliente
        </button>
    </div>

    <!-- Modal de Cliente -->
    <div class="modal fade" id="clienteModal">
        <div class="modal-dialog modal-lg">
            <div class="modal-content executive-modal">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="fas fa-user-plus"></i> Cadastrar Cliente
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="clienteForm">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label>Nome do Cliente</label>
                                <input type="text" class="form-control" id="nomeCliente" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label>Nome da Marca</label>
                                <input type="text" class="form-control" id="marca" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label>Valor Total</label>
                                <input type="number" class="form-control" id="valorTotal" step="0.01" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label>Dia de Vencimento</label>
                                <select class="form-select" id="diaVencimento" required>
                                    <option value="5">Dia 5</option>
                                    <option value="20">Dia 20</option>
                                </select>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label>Mês de Referência</label>
                                <input type="month" class="form-control" id="mesReferencia" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label>Quantidade de Parcelas</label>
                                <input type="number" class="form-control" id="qtdParcelas" min="1" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label>Status Inicial</label>
                                <select class="form-select" id="statusInicial">
                                    <option value="pendente">Pendente</option>
                                    <option value="finalizando">Finalizando Pagamento</option>
                                </select>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-executive" onclick="salvarCliente()">
                        <i class="fas fa-save"></i> Salvar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
