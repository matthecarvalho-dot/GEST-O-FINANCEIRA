<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRONOS SYSTEM - Gestão Financeira</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- CSS Personalizado -->
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <!-- Container Principal -->
    <div class="app-container">
        
        <!-- Header Executivo -->
        <header class="main-header">
            <div class="header-content">
                <div class="logo-area">
                    <div class="logo-icon">
                        <i class="fas fa-chart-line"></i>
                    </div>
                    <div class="logo-text">
                        <h1>KRONOS SYSTEM</h1>
                        <span>GESTÃO FINANCEIRA</span>
                    </div>
                </div>
                <div class="header-info">
                    <div class="datetime" id="currentDateTime"></div>
                    <div class="project-badge">
                        <i class="fas fa-database"></i> Firebase Connected
                    </div>
                </div>
            </div>
        </header>

        <!-- Dashboard Cards -->
        <div class="dashboard-cards">
            <div class="stat-card pago" onclick="filtrarPorStatus('pago')">
                <div class="card-icon">
                    <i class="fas fa-check-circle"></i>
                </div>
                <div class="card-info">
                    <h3 id="countPago">0</h3>
                    <p>PAGO</p>
                </div>
            </div>
            
            <div class="stat-card quitado" onclick="filtrarPorStatus('quitado')">
                <div class="card-icon">
                    <i class="fas fa-star"></i>
                </div>
                <div class="card-info">
                    <h3 id="countQuitado">0</h3>
                    <p>QUITADO</p>
                </div>
            </div>
            
            <div class="stat-card finalizando" onclick="filtrarPorStatus('finalizando')">
                <div class="card-icon">
                    <i class="fas fa-spinner"></i>
                </div>
                <div class="card-info">
                    <h3 id="countFinalizando">0</h3>
                    <p>FINALIZANDO</p>
                </div>
            </div>
            
            <div class="stat-card inadimplente" onclick="filtrarPorStatus('inadimplente')">
                <div class="card-icon">
                    <i class="fas fa-exclamation-triangle"></i>
                </div>
                <div class="card-info">
                    <h3 id="countInadimplente">0</h3>
                    <p>INADIMPLENTE</p>
                </div>
            </div>
        </div>

        <!-- Área de Filtros -->
        <div class="filters-section">
            <div class="row align-items-end">
                <div class="col-md-3">
                    <label class="filter-label">MÊS DE REFERÊNCIA</label>
                    <select id="mesFiltro" class="form-control custom-select" onchange="aplicarFiltros()">
                        <option value="">TODOS OS MESES</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="filter-label">DIA DE VENCIMENTO</label>
                    <select id="diaFiltro" class="form-control custom-select" onchange="aplicarFiltros()">
                        <option value="">TODOS OS DIAS</option>
                        <option value="5">DIA 5</option>
                        <option value="20">DIA 20</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="filter-label">STATUS</label>
                    <select id="statusFiltro" class="form-control custom-select" onchange="aplicarFiltros()">
                        <option value="">TODOS</option>
                        <option value="pago">PAGO</option>
                        <option value="quitado">QUITADO</option>
                        <option value="finalizando">FINALIZANDO</option>
                        <option value="inadimplente">INADIMPLENTE</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <button class="btn-limpar-filtros" onclick="limparFiltros()">
                        <i class="fas fa-times"></i> LIMPAR FILTROS
                    </button>
                </div>
            </div>
        </div>

        <!-- Tabela de Dados -->
        <div class="table-section">
            <div class="table-header">
                <h2><i class="fas fa-list"></i> CLIENTES</h2>
                <span id="totalRegistros">0 registros</span>
            </div>
            
            <div class="table-responsive">
                <table class="table executive-table">
                    <thead>
                        <tr>
                            <th>CLIENTE</th>
                            <th>MARCA</th>
                            <th>VENCIMENTO</th>
                            <th>VALOR TOTAL</th>
                            <th>EM ABERTO</th>
                            <th>PARCELAS</th>
                            <th>STATUS</th>
                            <th>AÇÕES</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaClientes">
                        <tr>
                            <td colspan="8" class="text-center">Carregando dados...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Botão Adicionar Cliente (Flutuante) -->
        <button class="btn-flutuante" onclick="abrirModalCliente()">
            <i class="fas fa-plus"></i>
        </button>
    </div>

    <!-- Modal: Adicionar/Editar Cliente -->
    <div class="modal fade" id="modalCliente" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content executive-modal">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="fas fa-user-plus"></i> 
                        <span id="modalTitulo">NOVO CLIENTE</span>
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formCliente">
                        <input type="hidden" id="clienteId">
                        
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">NOME DO CLIENTE *</label>
                                <input type="text" class="form-control custom-input" id="nomeCliente" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">NOME DA MARCA *</label>
                                <input type="text" class="form-control custom-input" id="marca" required>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label class="form-label">VALOR TOTAL (R$) *</label>
                                <input type="number" class="form-control custom-input" id="valorTotal" step="0.01" min="0" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">DIA VENCIMENTO *</label>
                                <select class="form-control custom-select" id="diaVencimento" required>
                                    <option value="5">DIA 5</option>
                                    <option value="20">DIA 20</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">MÊS REFERÊNCIA *</label>
                                <input type="month" class="form-control custom-input" id="mesReferencia" required>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">QUANTIDADE DE PARCELAS *</label>
                                <input type="number" class="form-control custom-input" id="qtdParcelas" min="1" value="1" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">STATUS INICIAL</label>
                                <select class="form-control custom-select" id="statusInicial">
                                    <option value="pendente">PENDENTE</option>
                                    <option value="pago">PAGO (Primeira Parcela)</option>
                                    <option value="finalizando">FINALIZANDO</option>
                                </select>
                            </div>
                        </div>

                        <div class="alert alert-info">
                            <i class="fas fa-info-circle"></i>
                            <strong>Valor da Parcela:</strong> R$ <span id="valorParcelaPreview">0,00</span>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-cancelar" data-bs-dismiss="modal">
                        <i class="fas fa-times"></i> CANCELAR
                    </button>
                    <button type="button" class="btn btn-salvar" onclick="salvarCliente()">
                        <i class="fas fa-save"></i> SALVAR
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal: Gerenciar Parcelas -->
    <div class="modal fade" id="modalParcelas" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content executive-modal">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="fas fa-file-invoice"></i>
                        GERENCIAR PARCELAS - <span id="clienteNomeParcelas"></span>
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="parcelasContainer">
                    <!-- Preenchido via JavaScript -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-cancelar" data-bs-dismiss="modal">FECHAR</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- App Principal -->
    <script src="js/app.js"></script>
</body>
</html>
